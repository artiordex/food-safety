<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="https://cdn.fusioncharts.com/fusioncharts/latest/fusioncharts.js"></script>
    <script type="text/javascript" src="https://cdn.fusioncharts.com/fusioncharts/latest/fusioncharts.charts.js"></script>
    <script type="text/javascript" src="https://cdn.fusioncharts.com/fusioncharts/latest/themes/fusioncharts.theme.fusion.js"></script>
</head>
<body>
    <div id="chart-container" style="width: 260px; height: 242px;"></div>
    <script>
        FusionCharts.ready(function() {
            var column2dChart = new FusionCharts({
                type: 'column3d',
                renderAt: 'chart-container',
                width: '100%',
                height: '100%',
                dataFormat: 'json',
                dataSource: {
                    "chart": {
                        "theme": "fusion"
                    },
                    "data": [
                        {"label": "Test", "value": "100"}
                    ]
                }
            });
            column2dChart.render();
        });
    </script>
</body>
</html>
