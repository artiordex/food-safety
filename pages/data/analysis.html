<!doctype html>
<html lang="ko">

<head>
  <!-- INCLUDE_HEAD -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="/index.css">
  <style>
    .tab-btn {
      outline: none;
      border: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      background: none;
    }
    .tab-btn:hover { color: #374151; }
    .tab-btn.active {
      border-bottom: 2px solid #3b82f6;
      color: #3b82f6;
      font-weight: bold;
    }
  </style>
</head>

<body class="bg-white flex flex-col min-h-screen">
  <div id="wrap" class="flex flex-col min-h-screen">
    <!-- INCLUDE_HEADER -->

    <!-- Tab Navigation (데이터 분석 통합 탭 바) -->
    <div class="bg-white border-b border-gray-200 shrink-0 px-6 flex justify-center space-x-8" id="analysis-tabs-container">
      <button data-tab="sql-playground" id="btn-tab-sql-playground" class="tab-btn px-6 py-4 text-base text-gray-500 hover:text-gray-700 focus:outline-none">실시간 DB 분석</button>
      <button data-tab="api-live-join" id="btn-tab-api-live-join" class="tab-btn px-6 py-4 text-base text-gray-500 hover:text-gray-700 focus:outline-none">실시간 API 전체 조인</button>
      <button data-tab="api-hygiene" id="btn-tab-api-hygiene" class="tab-btn px-6 py-4 text-base text-gray-500 hover:text-gray-700 focus:outline-none">지역 기반 위생 안심 요식업소 조회</button>
      <button data-tab="api-barcode" id="btn-tab-api-barcode" class="tab-btn px-6 py-4 text-base text-gray-500 hover:text-gray-700 focus:outline-none">바코드 기반 안전 식품 조회</button>
      <button data-tab="nongshim-spec" id="btn-tab-nongshim-spec" class="tab-btn px-6 py-4 text-base text-gray-500 hover:text-gray-700 focus:outline-none">농심 사내 규격 데이터 세트</button>
    </div>

    <!-- Tab Content -->
    <div class="bg-white flex-1" id="tab-content">
      <!-- Dynamic content will be injected here by app.js -->
    </div>

    <!-- Detail Panel Container -->
    <div id="detail-panel-container"></div>
    <div class="mt-auto">
      <!-- INCLUDE_FOOTER -->
    </div>
  </div>

  <!-- JavaScript -->
  <script type="module" src="/view/app.js?v=2"></script>
</body>

</html>
