<!doctype html>
<html lang="ko">

<head>
  <!-- INCLUDE_HEAD -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-cloud/1.2.5/d3.layout.cloud.min.js"></script>
  <link rel="stylesheet" href="/index.css">
  <style>
    .tab-btn.active {
      border-bottom: 2px solid #3b82f6;
      color: #3b82f6;
      font-weight: bold;
    }
  </style>
</head>

<body class="bg-white flex flex-col min-h-screen">
  <div id="wrap" class="flex flex-col min-h-screen">
    <!-- INCLUDE_HEADER -->

    <!-- Tab Navigation (데이터맵 / 관계도 / ERD 통합 탭 바) -->
    <div class="bg-white border-b border-gray-200 shrink-0 px-6 flex justify-center space-x-8" id="datamap-tabs-container">
      <button data-tab="keyword-datamap" id="btn-tab-keyword" class="tab-btn px-6 py-4 text-base text-gray-500 hover:text-gray-700 focus:outline-none transition-all">키워드 시각화</button>
      <button data-tab="wordcloud" id="btn-tab-wordcloud" class="tab-btn px-6 py-4 text-base text-gray-500 hover:text-gray-700 focus:outline-none transition-all">워드 클라우드</button>
      <button data-tab="datamap" id="btn-tab-datamap" class="tab-btn px-6 py-4 text-base text-gray-500 hover:text-gray-700 focus:outline-none transition-all">데이터맵</button>
      <button data-tab="erdmap" id="btn-tab-erdmap" class="tab-btn px-6 py-4 text-base text-gray-500 hover:text-gray-700 focus:outline-none transition-all">데이터 관계도</button>
      <button data-tab="db-erd" id="btn-tab-dberd" class="tab-btn px-6 py-4 text-base text-gray-500 hover:text-gray-700 focus:outline-none transition-all">데이터 ERD</button>
    </div>

    <!-- Tab Content -->
    <div class="bg-white min-h-[600px] flex-1" id="tab-content">
      <!-- Dynamic content will be injected here by app.js -->
    </div>

    <!-- Detail Panel Container -->
    <div id="detail-panel-container"></div>
  </div>

  <!-- JavaScript -->
  <script type="module" src="/view/app.js?v=2"></script>
</body>

</html>
