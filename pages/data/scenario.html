<!doctype html>
<html lang="ko">

<head>
  <!-- INCLUDE_HEAD -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="/index.css">
  <style>
    .tab-btn {
      outline: none;
      border: none;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      background: none;
    }
    .tab-btn:hover { color: #374151; }
    .tab-btn.active {
      border-bottom: 2px solid #3b82f6;
      color: #3b82f6;
      font-weight: bold;
    }
  </style>
</head>

<body class="bg-white flex flex-col min-h-screen">
  <div id="wrap" class="flex flex-col min-h-screen">
    <!-- INCLUDE_HEADER -->

    <!-- Tab Navigation (데이터 시나리오 통합 탭 바) -->
    <div class="bg-white border-b border-gray-200 shrink-0 px-6 flex justify-center space-x-8" id="scenario-tabs-container">
      <button data-tab="recommend-beginner" id="btn-tab-recommend-beginner" class="tab-btn px-6 py-4 text-base text-gray-500 hover:text-gray-700 focus:outline-none">1안: 카카오 디벨로퍼스형 (일반인용)</button>
      <button data-tab="recommend-developer" id="btn-tab-recommend-developer" class="tab-btn px-6 py-4 text-base text-gray-500 hover:text-gray-700 focus:outline-none">2안: 카카오 디벨로퍼스형 (개발자용)</button>
    </div>

    <!-- Tab Content -->
    <div class="bg-white flex-1" id="tab-content">
      <!-- Dynamic content will be injected here by app.js -->
    </div>

    <!-- Detail Panel Container -->
    <div id="detail-panel-container"></div>
    <div class="mt-auto">
      <!-- INCLUDE_FOOTER -->
    </div>
  </div>

  <!-- JavaScript -->
  <script type="module" src="/view/app.js?v=2"></script>
</body>

</html>
