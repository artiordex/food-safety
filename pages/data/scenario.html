<!doctype html>
<html lang="ko">

<head>
  <!-- INCLUDE_HEAD -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="/index.css">
  
</head>

<body class="bg-white flex flex-col min-h-screen">
  <div id="wrap" class="flex flex-col min-h-screen">
    <!-- INCLUDE_HEADER -->

    <!-- Tab Navigation (데이터 시나리오 통합 탭 바) -->
    <div class="bg-white border-b border-gray-200 shrink-0 px-6 flex justify-center space-x-8" id="scenario-tabs-container">
      <button data-tab="recommend-beginner" id="btn-tab-recommend-beginner" class="tab-btn px-6 py-4 text-base text-gray-500 hover:text-gray-700 focus:outline-none">1안: 카카오 디벨로퍼스형 (일반인용)</button>
      <button data-tab="recommend-developer" id="btn-tab-recommend-developer" class="tab-btn px-6 py-4 text-base text-gray-500 hover:text-gray-700 focus:outline-none">2안: 카카오 디벨로퍼스형 (개발자용)</button>
    </div>

    <!-- Tab Content -->
    <div class="bg-white flex-1" id="tab-content">
      <!-- Scenario View -->
      <div id="scenario-view" class="static-view" style="display: none;">
        <div class="w-full bg-[#f9fafb] font-sans py-6 px-4">
          <div class="max-w-7xl mx-auto flex min-h-[800px]">
            <!-- Sidebar -->
            <div class="w-72 bg-white border-r border-gray-200 overflow-y-auto">
              <div class="p-6 pb-2 border-b border-gray-100">
                <h3 id="scenario-sidebar-title" class="font-bold text-xl text-gray-800 tracking-tight"></h3>
                <p id="scenario-sidebar-desc" class="text-sm text-gray-500 mt-1"></p>
              </div>
              <ul id="scenario-list" class="p-4 space-y-1">
                <li class="px-4 py-3 text-sm text-gray-500">로딩 중...</li>
              </ul>
            </div>

            <!-- Main Content -->
            <div class="flex-1 bg-white overflow-y-auto" id="scenario-content-wrapper">
              <div class="max-w-4xl mx-auto p-10" id="scenario-content">
                <div class="flex flex-col items-center justify-center h-full mt-32 text-gray-400">
                  <svg class="animate-spin h-10 w-10 mb-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                  </svg>
                  <p>시나리오 데이터를 불러오고 있습니다...</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Detail Panel Container -->
    <div id="detail-panel-container"></div>
    <div class="mt-auto">
      <!-- INCLUDE_FOOTER -->
    </div>
  </div>

  <!-- JavaScript -->
  <script type="module" src="/view/app.js?v=3"></script>
</body>

</html>
