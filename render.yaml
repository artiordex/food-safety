services:
  - type: web
    name: food-safety-muxr
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: ALLOWED_ORIGINS
        value: https://food-safety-muxr.onrender.com
      - key: FOOD_API_KEY
        sync: false   # Render 대시보드에서 직접 입력
