<!DOCTYPE html>
<html lang="ko">

<head>
    <!-- INCLUDE_HEAD -->
    <!-- main.css는 head.html을 통해 /public/css/main.css 로 적용됨 -->
</head>

<body>
    <!-- 팝업 삭제 완료 -->
    <form id="baseForm" name="baseForm" method="post" onsubmit="return false;">
        <!-- 공통영역 -->
        <input type="hidden" id="menu_no" name="menu_no" value="">
        <input type="hidden" id="menu_grp" name="menu_grp" value="">
        <input type="hidden" id="filePath" name="filePath" />
        <input type="hidden" id="fileName" name="fileName" />
        <input type="hidden" id="orgFileName" name="orgFileName" />

        <!-- 공통영역 -->
        <div id="skipContent">
            <h2>바로가기 모음</h2>
            <a href="#gnb">주메뉴 바로가기</a>
            <a href="#container">본문 바로가기</a>
        </div>

        <div id="wrap">
            <!-- 헤더 -->
            <!-- INCLUDE_HEADER -->

            <!-- 각 메인화면 진입시 -->
            <input type="hidden" id="svc_type_cd" name="svc_type_cd"> <!-- svc_type_cd 서비스타입 -->
            <input type="hidden" id="cl_cd" name="cl_cd"> <!-- 서비스 분류 -->
            <input type="hidden" id="svc_no" name="svc_no"> <!-- svc_no 서비스번호 -->
            <!-- <input type="hidden" id="svc_nm" name="svc_nm"> --> <!-- svc_nm 서비스명 -->

            <!-- 게시판상세페이지전용 -->
            <input type="hidden" id="ntctxt_no" name="ntctxt_no">
            <input type="hidden" id="bbs_no" name="bbs_no">

            <!--본문-->
            <div id="container">

                <!-- INCLUDE_HERO -->

                <!-- 데이터검색 -->
                <div class="data_search_wrap">
                    <div class="data_search">
                        <div class="data_text_box">
                            <strong>공공데이터 검색</strong>
                            <p>식품의약품안전처 및 연계기관에서 개방하는<br>데이터를 검색할 수 있습니다. </p>
                        </div>
                        <div class="data_search_box">
                            <!-- <label for="data_search_input">검색어를 입력하세요.</label> -->
                            <input type="text" id="search_keyword" name="search_keyword" placeholder="검색어를 입력하세요"
                                onkeypress="if(event.keyCode===13){ datasetAllSearch('661', 'MENU_GRP31'); return false; }">
                            <!--data_search_input-->
                            <button type="button" onclick="datasetAllSearch('661', 'MENU_GRP31');">검색</button>
                        </div>
                        <div class="data_structure_search_box">
                            <button type="button" class="datastruct_view">데이터구조 검색</button>
                        </div>
                    </div>
                </div>
                <!-- //데이터검색 -->

                <!-- INCLUDE_MAIN_BOARD -->

            </div>
            <!--본문-->

            <!-- INCLUDE_FOOTER -->

            <!-- 데이터구조검색 보기 end -->
            <script src="/view/index_app.js"></script>
        </div>
    </form>
</body>

</html>
