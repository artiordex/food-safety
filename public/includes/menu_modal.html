<script>
  function openMenuModal() {
    document.querySelector('.sitemap_op').style.display = 'block';
    document.querySelector('.sitemap').style.display = 'block';
    document.body.style.overflow = 'hidden';
    loadSitemapOptions();
  }
  function closeMenuModal() {
    document.querySelector('.sitemap_op').style.display = 'none';
    document.querySelector('.sitemap').style.display = 'none';
    document.body.style.overflow = '';
  }
  document.querySelector('.sitemap_op').addEventListener('click', closeMenuModal);

  var _smLoaded = false;
  function loadSitemapOptions() {
    if (_smLoaded) return;
    _smLoaded = true;
    fetch('/api/categoryList.do')
      .then(function(r){ return r.json(); })
      .then(function(cats) {
        var li = document.getElementById('sm-cat-list');
        if (!li) return;
        li.outerHTML = cats.map(function(c) {
          return '<li><a href="/search.html?search_clCdCode=' + encodeURIComponent(c.cat) + '" class="dpt02">·  ' + c.cat + '</a></li>';
        }).join('');
      }).catch(function(){});
    fetch('/api/providerList.do')
      .then(function(r){ return r.json(); })
      .then(function(data) {
        var li = document.getElementById('sm-provd-list');
        if (!li) return;
        li.outerHTML = (data.list || []).map(function(nm) {
          return '<li><a href="/search.html?search_provdInsttCode=' + encodeURIComponent(nm) + '" class="dpt02">·  ' + nm + '</a></li>';
        }).join('');
      }).catch(function(){});
  }
</script>
