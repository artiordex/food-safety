<!doctype html>
<html lang="ko">

<head>
  <!-- INCLUDE_HEAD -->
  <!-- Mermaid.js for interactive ERD rendering -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <!-- Vis.js Network Standalone -->
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div id="wrap">
    <!-- INCLUDE_HEADER -->

    <!-- Tab Pills -->
    <div class="bg-white border-b border-slate-200" id="datamap-tab-bar">
      <div class="max-w-[1400px] mx-auto px-4 md:px-8">
        <div class="flex items-center gap-1 py-3 overflow-x-auto" id="datamap-tabs">
          <button data-tab="datamap"
            class="tab-pill px-4 md:px-5 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all text-slate-600 hover:text-gov-700 hover:bg-slate-50">
            분야별 데이터맵트리
          </button>
          <button data-tab="keyword-datamap"
            class="tab-pill px-4 md:px-5 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all text-slate-600 hover:text-gov-700 hover:bg-slate-50">
            데이터맵 노드
          </button>
          <button data-tab="erdmap"
            class="tab-pill px-4 md:px-5 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-all text-slate-600 hover:text-gov-700 hover:bg-slate-50">
            데이터관계도
          </button>
        </div>
        <div class="flex items-center gap-4 py-3 overflow-x-auto" id="scenario-tabs" style="display: none;">
          <button data-tab="recommend-beginner"
            class="tab-pill pb-2 text-sm font-medium whitespace-nowrap transition-all border-b-2 border-transparent text-slate-500 hover:text-gov-700 flex items-center gap-2">
            <i class="ri-user-line"></i> 1안 (일반인용)
          </button>
          <button data-tab="recommend-developer"
            class="tab-pill pb-2 text-sm font-medium whitespace-nowrap transition-all border-b-2 border-transparent text-slate-500 hover:text-gov-700 flex items-center gap-2">
            <i class="ri-code-box-line"></i> 2안 (개발자용)
          </button>
        </div>
      </div>
    </div>

    <!-- Tab Content -->
    <div class="bg-slate-50/50 min-h-[600px]" id="tab-content">
      <!-- Dynamic content will be injected here by app.js -->
    </div>

    <!-- Detail Panel Container -->
    <div id="detail-panel-container"></div>
  </div>

  <!-- JavaScript -->
  <script type="module" src="view/app.js?v=2"></script>
</body>

</html>
